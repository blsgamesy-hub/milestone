<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="이정표">
<meta name="theme-color" content="#E9EDEA">
<link rel="manifest" href="./manifest_milestone.json">
<link rel="apple-touch-icon" href="./icon_192_milestone.png">
<title>이정표 길</title>
<style>
  :root{
    --mist:#E9EDEA;
    --mist-deep:#F4F6F3;
    --card:#FBFCFA;
    --stone:#8A928C;
    --stone-deep:#6F776F;
    --moss:#7A9B76;
    --moss-deep:#5E7D5A;
    --lantern:#DF9F4E;
    --lantern-soft:#E9B872;
    --ink:#39413B;
    --ink-soft:#78827A;
    --fog:#AAB4AC;
    --line:#DBE0DB;
    --star:#8B8FCB;
    --star-deep:#6C70AC;
    --star-dim:#D3D5EA;
    --gold:#D6A230;
    --gold-dim:#E8DDBE;
    --rose:#C98FA0;
    --rose-deep:#A66478;
    --rose-dim:#EDD9DF;
    --radius:16px;
    --shadow:0 1px 2px rgba(57,65,59,.05), 0 8px 24px rgba(57,65,59,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Apple SD Gothic Neo','Pretendard','Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--mist);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    /* 위쪽 옅은 안개 그라디언트 */
    background-image:linear-gradient(180deg,#EEF1EE 0%,var(--mist) 40%);
    background-attachment:fixed;
  }
  #app{max-width:560px;margin:0 auto;min-height:100%;
    padding:calc(env(safe-area-inset-top) + 18px) 20px calc(env(safe-area-inset-bottom) + 40px);
    display:flex;flex-direction:column}

  #toolRoot{position:relative}

  /* ---- 히어로 내 도구 스위처 ---- */
  .cap-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .cap-left{display:flex;align-items:center;gap:8px;min-width:0}
  .cap-right{display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .switcher{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.16);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.38);
    border-radius:999px;padding:4px 10px 4px 8px;color:#fff;font-size:10px;font-weight:700;
    letter-spacing:.1em;cursor:pointer;text-shadow:0 1px 6px rgba(40,52,42,.35);white-space:nowrap}
  .switcher svg{width:12px;height:12px;stroke:#fff;flex:0 0 auto}
  .switcher-menu{position:absolute;top:152px;right:20px;z-index:5;background:var(--card);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:6px;
    min-width:136px;display:none}
  .switcher-menu.open{display:block}
  .switcher-menu button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;
    background:none;border:none;font-size:13px;font-weight:600;color:var(--ink-soft);
    padding:9px 10px;border-radius:9px;cursor:pointer;font-family:inherit}
  .switcher-menu button.active{color:var(--ink);background:var(--mist-deep)}
  .switcher-menu button .sw-dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex:0 0 auto}
  .switcher-menu button.active .sw-dot{background:var(--lantern)}

  .guide-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
    background:rgba(255,255,255,.16);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.38);border-radius:50%;cursor:pointer;font-size:13px;
    line-height:1;padding:0}

  /* 분기 사이클 필 (OKR 전용) */
  .cycle-pill-wrap{position:relative;flex:0 0 auto}
  .cycle-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.5);
    border:1px solid rgba(120,130,150,.25);border-radius:999px;padding:3px 8px 3px 10px;
    font-size:10.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;letter-spacing:.02em}
  .cycle-pill svg{width:11px;height:11px;stroke:var(--ink-soft)}
  .cycle-menu{position:absolute;top:30px;left:0;z-index:6;background:var(--card);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:6px;
    min-width:180px;display:none}
  .cycle-menu.open{display:block}
  .cycle-menu button{display:flex;align-items:center;justify-content:space-between;width:100%;
    text-align:left;background:none;border:none;font-size:13px;font-weight:600;color:var(--ink-soft);
    padding:9px 10px;border-radius:9px;cursor:pointer;font-family:inherit}
  .cycle-menu button:hover{background:var(--mist-deep)}
  .cycle-menu .cm-pct{font-size:11px;color:var(--star-deep);font-weight:700}
  .cycle-menu-empty{font-size:12px;color:var(--fog);padding:9px 10px}
  .cycle-menu-divider{height:1px;background:var(--line);margin:4px 2px}
  .cycle-menu-close{color:var(--rose-deep) !important}

  .readonly-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--mist-deep);border:1px solid var(--line);border-radius:12px;
    padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--ink-soft)}
  .readonly-banner button{background:none;border:none;color:var(--star-deep);font-weight:700;
    font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}

  /* 가이드 모달 */
  .guide-overlay{position:fixed;inset:0;background:rgba(57,65,59,.4);z-index:50;
    display:flex;align-items:flex-end;justify-content:center}
  .guide-modal{background:var(--card);border-radius:22px 22px 0 0;max-width:560px;width:100%;
    max-height:82vh;display:flex;flex-direction:column;overflow:hidden}
  .guide-head{display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px 8px}
  .guide-head h2{font-size:18px;font-weight:800}
  .guide-close{background:var(--mist-deep);border:none;border-radius:50%;width:30px;height:30px;
    font-size:16px;color:var(--ink-soft);cursor:pointer;flex:0 0 auto}
  .guide-tabs{display:flex;gap:6px;padding:6px 22px 14px;border-bottom:1px solid var(--line);
    overflow-x:auto;scrollbar-width:none}
  .guide-tabs::-webkit-scrollbar{display:none}
  .guide-tab{flex:0 0 auto;background:var(--mist-deep);border:1px solid var(--line);border-radius:999px;
    padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;
    font-family:inherit;white-space:nowrap}
  .guide-tab.active{background:var(--ink);color:#F4F6F3;border-color:var(--ink)}
  .guide-body{overflow-y:auto;padding:18px 22px calc(env(safe-area-inset-bottom) + 26px)}
  .guide-body h4{font-size:12px;font-weight:800;color:var(--star-deep);margin:16px 0 7px;
    letter-spacing:.02em}
  .guide-body h4:first-of-type{margin-top:2px}
  .guide-body ul{padding-left:18px;margin-bottom:2px}
  .guide-body li{font-size:13.5px;color:var(--ink-soft);line-height:1.65;margin-bottom:7px}
  .guide-body .g-sub{font-size:12.5px;color:var(--fog);margin-bottom:14px;line-height:1.6;
    padding-bottom:14px;border-bottom:1px dashed var(--line)}
  .guide-body .g-purpose{font-size:13.5px;color:var(--ink);font-weight:700;line-height:1.6;
    background:linear-gradient(135deg,rgba(223,159,78,.1),rgba(139,143,203,.08));
    border-radius:10px;padding:11px 13px;margin-bottom:16px}
  .guide-body .g-ex{display:inline-block;margin-top:3px;font-size:12px;color:var(--fog)}
  .guide-body p.g-tip{font-size:12.5px;color:var(--ink-soft);background:var(--mist-deep);
    border-radius:10px;padding:10px 12px;line-height:1.55;margin-top:12px}

  .content{display:contents}

  /* ---- 상단 히어로 (풀블리드) ---- */
  .hero{position:relative;height:184px;
    margin:calc(-1*(env(safe-area-inset-top) + 18px)) -20px 20px;
    border-radius:0;box-shadow:0 6px 20px rgba(57,65,59,.08)}
  .hero svg.scene{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}
  .hero .cap{position:absolute;left:22px;right:22px;bottom:18px;z-index:2}
  .hero h1{font-size:24px;font-weight:700;letter-spacing:.05em;color:#fff;
    text-shadow:0 1px 10px rgba(40,52,42,.4)}
  .hero .sub{display:block;font-size:10.5px;color:rgba(255,255,255,.82);letter-spacing:.18em;
    margin-top:3px;text-shadow:0 1px 8px rgba(40,52,42,.35)}

  /* 목표 칩 줄 */
  .goalbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none}
  .goalbar::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:7px 14px;border-radius:999px;border:1px solid var(--line);
    background:var(--mist-deep);color:var(--ink-soft);font-size:13px;font-weight:500;cursor:pointer;
    white-space:nowrap;transition:all .18s ease}
  .chip.active{background:var(--ink);color:#F4F6F3;border-color:var(--ink)}
  .chip.add{border-style:dashed;color:var(--fog);font-weight:600}

  /* 목표 헤더 */
  .goalhead{margin:14px 2px 8px}
  .goalhead .title{font-size:26px;font-weight:700;letter-spacing:-.01em;line-height:1.25;
    background:none;border:none;color:var(--ink);width:100%;font-family:inherit;resize:none;overflow:hidden}
  .goalhead .title:focus{outline:none}
  .goalmeta{display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap}
  .deadline-btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);
    background:var(--mist-deep);border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer}
  .deadline-btn.past{color:var(--fog);background:transparent;border-style:dashed}
  .deadline-btn .dot{width:5px;height:5px;border-radius:50%;background:var(--moss)}
  .deadline-btn.past .dot{background:var(--fog)}
  .progress-note{font-size:12.5px;color:var(--fog)}
  .goal-del{margin-left:auto;font-size:12px;color:var(--fog);background:none;border:none;cursor:pointer;padding:4px}

  /* ---- 이정표 길 ---- */
  .path{position:relative;margin:22px 0 8px;padding-left:6px}
  .stone{position:relative;padding-left:44px;padding-bottom:16px}
  /* 세로 길 선 */
  .stone::before{content:"";position:absolute;left:13px;top:26px;bottom:-4px;width:2px;
    background:var(--line)}
  .stone:last-child::before{display:none}
  .stone.passed::before{background:var(--moss)}
  /* 노드 (이정표 머리) */
  .node{position:absolute;left:0;top:2px;width:28px;height:28px;border-radius:50%;
    background:var(--mist-deep);border:2px solid var(--line);display:flex;align-items:center;
    justify-content:center;cursor:pointer;transition:all .2s ease;z-index:2}
  .node svg{width:14px;height:14px}
  .stone.passed .node{background:var(--moss);border-color:var(--moss)}
  .stone.passed .node svg{stroke:#fff}
  .stone.here .node{background:var(--lantern);border-color:var(--lantern);
    box-shadow:0 0 0 6px rgba(223,159,78,.16),0 0 22px 4px rgba(223,159,78,.3)}
  .stone.here .node svg{stroke:#fff}
  .stone.ahead .node{background:var(--mist-deep);border-color:var(--line)}

  /* 지금 여기 등불 은은한 맥동 */
  @keyframes glow{0%,100%{box-shadow:0 0 0 6px rgba(223,159,78,.14),0 0 18px 3px rgba(223,159,78,.24)}
    50%{box-shadow:0 0 0 7px rgba(223,159,78,.2),0 0 26px 6px rgba(223,159,78,.36)}}
  .stone.here .node{animation:glow 3.2s ease-in-out infinite}

  /* 카드 */
  .m-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;box-shadow:var(--shadow);transition:opacity .25s ease}
  .stone.ahead .m-card{opacity:.52}
  .stone.ahead .m-card:focus-within,.stone.ahead:hover .m-card{opacity:.9}
  .stone.here .m-card{border-color:rgba(223,159,78,.4)}
  .m-top{display:flex;align-items:flex-start;gap:10px}
  .m-title{flex:1;font-size:15.5px;font-weight:600;color:var(--ink);background:none;border:none;
    font-family:inherit;width:100%;resize:none;overflow:hidden;line-height:1.4}
  .m-title:focus{outline:none}
  .stone.passed .m-title{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--fog)}
  .here-tag{flex:0 0 auto;font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--lantern);
    background:rgba(223,159,78,.12);border-radius:999px;padding:3px 8px;margin-top:1px}

  .m-foot{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
  .mini{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-soft);
    background:none;border:none;cursor:pointer;padding:3px 4px;border-radius:8px}
  .mini:hover{background:var(--mist-deep)}
  .mini.dl{color:var(--moss-deep)}
  .mini.dl.past{color:var(--fog)}
  .mini svg{width:13px;height:13px}
  .m-del{margin-left:auto;color:var(--fog)}

  /* 작은 행동 (펼침) */
  .subs{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);display:none}
  .subs.open{display:block}
  .sub{display:flex;align-items:center;gap:9px;padding:5px 0}
  .sub .sbox{width:16px;height:16px;border-radius:5px;border:1.6px solid var(--line);flex:0 0 auto;
    cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sub .sbox.on{background:var(--moss);border-color:var(--moss)}
  .sub .sbox svg{width:10px;height:10px;stroke:#fff}
  .sub input{flex:1 1 0;min-width:0;font-size:13.5px;color:var(--ink);background:none;border:none;font-family:inherit}
  .sub input:focus{outline:none}
  .sub input.done{color:var(--fog);text-decoration:line-through}
  .sub .x{flex:0 0 auto;color:var(--fog);background:none;border:none;cursor:pointer;font-size:15px;padding:3px 4px}
  .sub-add{font-size:12.5px;color:var(--ink-soft);background:none;border:none;cursor:pointer;
    padding:6px 0;margin-top:2px}

  /* 이정표 추가 */
  .add-stone{position:relative;padding-left:44px}
  .add-stone::before{content:"";position:absolute;left:13px;top:-24px;height:26px;width:2px;background:var(--line)}
  .add-stone .node{background:transparent;border-style:dashed;border-color:var(--fog)}
  .add-stone .node svg{stroke:var(--fog)}
  .add-btn{width:100%;text-align:left;background:transparent;border:1px dashed var(--line);
    border-radius:var(--radius);padding:13px 16px;color:var(--fog);font-size:14px;font-weight:500;
    cursor:pointer;font-family:inherit}
  .add-btn:hover{border-color:var(--stone);color:var(--ink-soft)}

  /* 빈 상태 */
  .empty{text-align:center;padding:60px 20px;margin:auto 0}
  .empty .ic{width:60px;height:60px;margin:0 auto 20px}
  .empty h2{font-size:19px;font-weight:700;margin-bottom:8px}
  .empty p{font-size:14px;color:var(--ink-soft);margin-bottom:24px;line-height:1.6}
  .btn-primary{background:var(--ink);color:#F4F6F3;border:none;border-radius:12px;padding:13px 26px;
    font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

  /* 목표 완주 배너 */
  .done-banner{background:linear-gradient(135deg,rgba(122,155,118,.14),rgba(223,159,78,.12));
    border:1px solid rgba(122,155,118,.3);border-radius:var(--radius);padding:16px 18px;margin-top:8px;
    font-size:14px;color:var(--moss-deep);font-weight:600;display:flex;align-items:center;gap:10px}

  input[type=date]{position:absolute;inset:0;width:100%;height:100%;opacity:0;
    cursor:pointer;border:none;background:none}

  /* ---- OKR 도구 ---- */
  .okr-hero .cap h1{color:var(--ink);text-shadow:none}
  .okr-hero .cap .sub{color:var(--ink-soft);text-shadow:none}
  .okr-hero .switcher{background:rgba(255,255,255,.55);border-color:rgba(120,130,150,.25);
    color:var(--ink-soft);text-shadow:none}
  .okr-hero .switcher svg{stroke:var(--ink-soft)}

  .obj-ring-wrap{display:flex;align-items:center;gap:8px}
  .obj-ring-wrap svg{width:34px;height:34px;flex:0 0 auto}
  .obj-ring-pct{font-size:13px;font-weight:700;color:var(--star-deep)}
  .obj-ring-label{font-size:11.5px;color:var(--fog)}
  .stretch-note{font-size:11.5px;color:var(--fog);margin-top:6px}

  .tag-o{display:inline-flex;align-items:center;font-size:9.5px;font-weight:800;letter-spacing:.06em;
    color:var(--ink-soft);background:var(--mist-deep);border:1px solid var(--line);
    border-radius:6px;padding:2px 6px;margin-bottom:8px}
  .tag-kr{display:inline-flex;align-items:center;font-size:9px;font-weight:800;letter-spacing:.05em;
    color:var(--star-deep);background:rgba(139,143,203,.13);border-radius:6px;padding:2px 6px;
    flex:0 0 auto;margin-bottom:8px}

  .kr-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px}
  .kr-top{display:flex;align-items:flex-start;gap:10px}
  .kr-title{flex:1;font-size:15px;font-weight:600;color:var(--ink);background:none;border:none;
    font-family:inherit;width:100%;resize:none;overflow:hidden;line-height:1.4}
  .kr-title:focus{outline:none}
  .kr-del{flex:0 0 auto;font-size:11.5px;color:var(--fog);background:none;border:none;cursor:pointer;
    padding:3px 4px}

  .kr-bar-row{margin-top:11px}
  .kr-bar{position:relative;height:8px;border-radius:999px;background:var(--mist-deep);overflow:hidden}
  .kr-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--star-dim),var(--star));
    transition:width .3s ease}
  .kr-nums{display:flex;align-items:baseline;justify-content:space-between;margin-top:7px;
    font-size:11.5px;color:var(--fog)}
  .kr-nums .kr-pct{font-weight:700;color:var(--star-deep);font-size:12.5px}

  .kr-inputs{display:flex;align-items:center;gap:10px;margin-top:11px;flex-wrap:wrap}
  .kr-field{display:flex;flex-direction:column;gap:3px}
  .kr-field label{font-size:10px;color:var(--fog);letter-spacing:.04em}
  .kr-field input{width:64px;font-size:13.5px;font-weight:600;color:var(--ink);background:var(--mist-deep);
    border:1px solid var(--line);border-radius:8px;padding:5px 7px;font-family:inherit}
  .kr-field input:focus{outline:none;border-color:var(--star)}
  .kr-field.cur input{width:76px;border-color:rgba(139,143,203,.4);background:#fff}
  .kr-unit{font-size:11.5px;color:var(--fog);align-self:flex-end;padding-bottom:6px}

  .conf-field{margin-left:auto}
  .conf-field input{width:54px;border-color:rgba(201,143,160,.5);color:var(--rose-deep);
    -moz-appearance:textfield;text-align:center}
  .conf-field input::-webkit-outer-spin-button,
  .conf-field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .conf-field input:focus{border-color:var(--rose)}
  .conf-input-row{display:flex;align-items:center;gap:3px}
  .conf-input-row .pct-suffix{font-size:11.5px;color:var(--rose-deep);font-weight:700}

  .add-kr-btn{width:100%;text-align:left;background:transparent;border:1px dashed var(--line);
    border-radius:var(--radius);padding:13px 16px;color:var(--fog);font-size:14px;font-weight:500;
    cursor:pointer;font-family:inherit;margin-top:4px}
  .add-kr-btn:hover{border-color:var(--star);color:var(--star-deep)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ---- 앱 셸 (도구 전환·마지막 상태 기억) ----
const APP_KEY="goal_lens_shell_v1";
let appState={lastTool:"milestone"};
function loadApp(){
  try{const r=localStorage.getItem(APP_KEY);if(r)appState={...appState,...JSON.parse(r)};}catch(e){}
}
function saveApp(){try{localStorage.setItem(APP_KEY,JSON.stringify(appState));}catch(e){}}

const TOOLS=[
  {id:"milestone", label:"이정표", render:renderMilestoneTool},
  {id:"okr", label:"별자리", render:renderOkrTool}
];

function renderShell(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const root=el("div","toolRoot");root.id="toolRoot";
  app.appendChild(root);

  const active=TOOLS.find(t=>t.id===appState.lastTool)||TOOLS[0];
  active.render();

let switcherOpen=false;
function buildSwitcher(){
  const wrap=document.createDocumentFragment();
  const btn=el("button","switcher");
  const label=TOOLS.length>1?"도구 전환":(TOOLS.find(t=>t.id===appState.lastTool)||TOOLS[0]).label;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3L3 7l4 4"/><path d="M3 7h13a4 4 0 0 1 4 4v1"/><path d="M17 21l4-4-4-4"/><path d="M21 17H8a4 4 0 0 1-4-4v-1"/></svg><span>'+esc(label)+'</span>';

  const menu=el("div","switcher-menu"+(switcherOpen?" open":""));
  menu.id="switcherMenu";
  TOOLS.forEach(t=>{
    const mb=el("button",t.id===appState.lastTool?"active":"");
    mb.innerHTML='<span class="sw-dot"></span><span>'+esc(t.label)+'</span>';
    mb.onclick=(e)=>{e.stopPropagation();
      if(appState.lastTool!==t.id){appState.lastTool=t.id;saveApp();}
      switcherOpen=false;renderShell();};
    menu.appendChild(mb);
  });

  btn.onclick=(e)=>{e.stopPropagation();switcherOpen=!switcherOpen;
    menu.classList.toggle("open",switcherOpen);};

  wrap.appendChild(btn);
  wrap.appendChild(menu);

  // 바깥 클릭시 닫기 (한 번만 등록)
  if(!window.__switcherOutsideBound){
    window.__switcherOutsideBound=true;
    document.addEventListener("click",()=>{
      if(switcherOpen){switcherOpen=false;
        const m=document.getElementById("switcherMenu");
        if(m)m.classList.remove("open");}
    });
  }
  return wrap;
}

function fmt(d){
  if(!d)return"";
  const dt=new Date(d+"T00:00:00");
  return (dt.getMonth()+1)+"월 "+dt.getDate()+"일";
}
function isPast(d){
  if(!d)return false;
  const t=new Date();t.setHours(0,0,0,0);
  return new Date(d+"T00:00:00") < t;
}
function ddayText(d){
  if(!d)return"";
  const t=new Date();t.setHours(0,0,0,0);
  const target=new Date(d+"T00:00:00");
  const diff=Math.round((target-t)/86400000);
  if(diff===0)return"오늘";
  if(diff>0)return"D-"+diff;
  return"지남";
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function goalById(id){return state.goals.find(g=>g.id===id);}

function renderMilestoneTool(){
  const app=document.getElementById("toolRoot");
  app.innerHTML="";

  // 히어로 (안개 낀 오솔길 풍경)
  const hero=el("div","hero");
  hero.innerHTML=SCENE_SVG;
  const cap=el("div","cap");
  const h1=document.createElement("h1");h1.textContent="이정표 길";
  const capRow=el("div","cap-row");
  const sub=el("span","sub");sub.textContent="MILESTONE PATH";
  capRow.appendChild(sub);
  cap.appendChild(h1);cap.appendChild(capRow);
  hero.appendChild(cap);
  app.appendChild(hero);

  const content=el("div","content");
  app.appendChild(content);

  // 목표 칩 줄
  const bar=el("div","goalbar");
  state.goals.forEach(g=>{
    const c=el("button","chip"+(g.id===state.active?" active":""));
    c.textContent=g.title||"(제목 없음)";
    c.onclick=()=>{state.active=g.id;save();renderMilestoneTool();};
    bar.appendChild(c);
  });
  const addChip=el("button","chip add");
  addChip.textContent="+ 목표";
  addChip.onclick=addGoal;
  bar.appendChild(addChip);
  content.appendChild(bar);

  const g=goalById(state.active);
  if(!g){renderEmpty(content);return;}

  // 목표 헤더
  const head=el("div","goalhead");
  const title=document.createElement("textarea");
  title.className="title";title.rows=1;title.value=g.title;title.placeholder="목표 이름";
  title.oninput=()=>{g.title=title.value;autoGrow(title);save();
    const chip=[...bar.querySelectorAll(".chip")].find((c,i)=>state.goals[i]&&state.goals[i].id===g.id);
    if(chip)chip.textContent=title.value||"(제목 없음)";};
  head.appendChild(title);

  const meta=el("div","goalmeta");
  meta.appendChild(deadlineControl(g,true));
  const total=g.milestones.length, done=g.milestones.filter(m=>m.done).length;
  if(total>0){
    const note=el("span","progress-note");
    note.textContent=done+" / "+total+" 이정표";
    meta.appendChild(note);
  }
  const del=el("button","goal-del");del.textContent="목표 삭제";
  del.onclick=()=>{if(confirm("이 목표를 삭제할까요?")){
    state.goals=state.goals.filter(x=>x.id!==g.id);
    state.active=state.goals[0]?state.goals[0].id:null;save();renderMilestoneTool();}};
  meta.appendChild(del);
  head.appendChild(meta);
  content.appendChild(head);
  requestAnimationFrame(()=>autoGrow(title));

  // 이정표 길
  const path=el("div","path");
  const hi=hereIndex(g);
  g.milestones.forEach((m,i)=>{
    let cls="stone ";
    if(m.done)cls+="passed";
    else if(i===hi)cls+="here";
    else cls+="ahead";
    path.appendChild(stoneEl(g,m,i,cls,i===hi));
  });

  // 이정표 추가
  const addWrap=el("div","add-stone");
  const node=el("div","node");node.innerHTML=IC.plus;
  addWrap.appendChild(node);
  const addBtn=el("button","add-btn");
  addBtn.textContent="이정표 세우기";
  addBtn.onclick=()=>{
    g.milestones.push({id:uid(),title:"",deadline:null,done:false,expanded:false,subs:[]});
    save();renderMilestoneTool();
    // 새 카드 포커스
    setTimeout(()=>{const ins=document.querySelectorAll(".m-title");if(ins.length)ins[ins.length-1].focus();},60);
  };
  addWrap.appendChild(addBtn);
  path.appendChild(addWrap);
  content.appendChild(path);

  // 완주 배너
  if(g.milestones.length>0 && g.milestones.every(m=>m.done)){
    const b=el("div","done-banner");
    b.innerHTML='<span style="font-size:18px">🏁</span> 이 길의 이정표를 모두 지나왔어요.';
    content.appendChild(b);
  }
}

function quarterLabel(d){
  d=d||new Date();
  return d.getFullYear()+" Q"+(Math.floor(d.getMonth()/3)+1);
}
function nextQuarterLabel(label){
  const m=label.match(/(\d+)\s*Q(\d)/);
  if(!m)return quarterLabel();
  let y=Number(m[1]),q=Number(m[2])+1;
  if(q>4){q=1;y++;}
  return y+" Q"+q;
}
function makeCycle(label){
  return {id:"c_"+uid(),label:label,archived:false,objectives:[],active:null};
}
function activeCycle(){return okrState.cycles.find(c=>c.id===okrState.currentCycleId);}
function viewCycle(){return okrState.cycles.find(c=>c.id===(viewingCycleId||okrState.currentCycleId))||activeCycle();}
function isReadOnly(){return !!viewingCycleId && viewingCycleId!==okrState.currentCycleId;}

function loadOkr(){
  try{const r=localStorage.getItem(OKR_KEY);if(r)okrState=JSON.parse(r);}catch(e){}
  // 구버전(사이클 없는) 데이터 마이그레이션
  if(!okrState.cycles){
    const oldObjectives=okrState.objectives||[];
    const oldActive=okrState.active||(oldObjectives[0]&&oldObjectives[0].id)||null;
    const c=makeCycle(quarterLabel());
    c.objectives=oldObjectives;c.active=oldActive;
    okrState={currentCycleId:c.id,cycles:[c]};
  }
  if(!okrState.cycles.length){
    const c=makeCycle(quarterLabel());
    okrState.cycles.push(c);okrState.currentCycleId=c.id;
  }
  if(!okrState.currentCycleId||!okrState.cycles.find(c=>c.id===okrState.currentCycleId)){
    let cur=okrState.cycles.find(c=>!c.archived);
    if(!cur){
      const lastLabel=okrState.cycles[okrState.cycles.length-1].label;
      cur=makeCycle(nextQuarterLabel(lastLabel));
      okrState.cycles.push(cur);
    }
    okrState.currentCycleId=cur.id;
  }
}
function saveOkr(){try{localStorage.setItem(OKR_KEY,JSON.stringify(okrState));}catch(e){}}

function objById(id){return viewCycle().objectives.find(o=>o.id===id);}
function krProgress(kr){
  const s=Number(kr.start)||0,t=Number(kr.target)||0,c=Number(kr.current)||0;
  if(t===s)return c>=t?1:0;
  return Math.max(0,Math.min(1,(c-s)/(t-s)));
}
function objProgress(o){
  if(!o.keyResults.length)return 0;
  return o.keyResults.reduce((sum,kr)=>sum+krProgress(kr),0)/o.keyResults.length;
}
function cycleProgress(c){
  if(!c.objectives.length)return 0;
  return c.objectives.reduce((sum,o)=>sum+objProgress(o),0)/c.objectives.length;
}

function closeCycle(){
  if(!confirm("이번 분기를 접고 새 분기를 시작할까요?\n지금 목표들은 기록으로 남고, 새 분기는 빈 화면에서 시작해요.")) return;
  const cur=activeCycle();
  cur.archived=true;
  const nc=makeCycle(nextQuarterLabel(cur.label));
  okrState.cycles.push(nc);
  okrState.currentCycleId=nc.id;
  viewingCycleId=null;
  saveOkr();renderOkrTool();
}

    bar.appendChild(c);
  });
  if(!readOnly){
    const addChip=el("button","chip add");
    addChip.textContent="+ 목표";
    addChip.onclick=addObjective;
    if(cyc.objectives.length>=3)addChip.style.display="none";
    bar.appendChild(addChip);
  }
  content.appendChild(bar);

  const o=objById(cyc.active);
  if(!o){renderOkrEmpty(content,readOnly);return;}

  // 목표 헤더
  const head=el("div","goalhead");
  const otag=el("div","tag-o");otag.textContent="OBJECTIVE · 가슴뛰는 목표";
  head.appendChild(otag);
  const title=document.createElement("textarea");
  title.className="title";title.rows=1;title.value=o.title;title.placeholder="목표 이름 (Objective)";
  title.disabled=readOnly;
  title.oninput=()=>{o.title=title.value;autoGrow(title);saveOkr();
    const chip=[...bar.querySelectorAll(".chip")].find((c,i)=>cyc.objectives[i]&&cyc.objectives[i].id===o.id);
    if(chip)chip.textContent=title.value||"(제목 없음)";};
  head.appendChild(title);

  const meta=el("div","goalmeta");
  meta.appendChild(deadlineControl(o,true,saveOkr,renderOkrTool));
  if(o.keyResults.length>0){
    const ringWrap=el("div","obj-ring-wrap");
    const p=objProgress(o);
    ringWrap.appendChild(ringSvg(p));
    const pct=el("span","obj-ring-pct");pct.textContent=Math.round(p*100)+"%";
    ringWrap.appendChild(pct);
    const lbl=el("span","obj-ring-label");lbl.textContent="평균 진척";
    ringWrap.appendChild(lbl);
    meta.appendChild(ringWrap);
  }
  if(!readOnly){
    const del=el("button","goal-del");del.textContent="목표 삭제";
    del.onclick=()=>{if(confirm("이 목표를 삭제할까요?")){
      cyc.objectives=cyc.objectives.filter(x=>x.id!==o.id);
      cyc.active=cyc.objectives[0]?cyc.objectives[0].id:null;saveOkr();renderOkrTool();}};
    meta.appendChild(del);
  }
  head.appendChild(meta);
  if(o.keyResults.length>0){
    const stretch=el("div","stretch-note");

  const list=el("div");

  o.keyResults.forEach(kr=>list.appendChild(krCard(o,kr,readOnly)));

        return;
      }
      o.keyResults.push({id:uid(),name:"",unit:"",start:0,current:0,target:100,confidence:50});
      saveOkr();renderOkrTool();
      setTimeout(()=>{const ins=document.querySelectorAll(".kr-title");if(ins.length)ins[ins.length-1].focus();},60);
    };
    if(o.keyResults.length>=5)addKrBtn.style.display="none";
    content.appendChild(addKrBtn);
  }
}

let cyclePillOpen=false;
function cyclePill(){
  const wrap=el("div","cycle-pill-wrap");
  const cyc=viewCycle();
  const btn=el("button","cycle-pill");
  btn.innerHTML='<span>'+esc(cyc.label)+'</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  const menu=el("div","cycle-menu"+(cyclePillOpen?" open":""));

  const archived=okrState.cycles.filter(c=>c.id!==okrState.currentCycleId).slice().reverse();
  if(archived.length===0){
    const empty=el("div","cycle-menu-empty");empty.textContent="지난 분기 기록이 아직 없어요";
    menu.appendChild(empty);
  }else{
    archived.forEach(c=>{
      const mb=el("button","");
      const pct=Math.round(cycleProgress(c)*100);
      mb.innerHTML='<span class="cm-label">'+esc(c.label)+'</span><span class="cm-pct">'+pct+'%</span>';
      mb.onclick=(e)=>{e.stopPropagation();viewingCycleId=c.id;cyclePillOpen=false;renderOkrTool();};
      menu.appendChild(mb);
    });
  }
  const divider=el("div","cycle-menu-divider");menu.appendChild(divider);
  const closeBtn=el("button","cycle-menu-close");
  closeBtn.textContent="이번 분기 접고 새 분기 시작";
  closeBtn.onclick=(e)=>{e.stopPropagation();cyclePillOpen=false;closeCycle();};
  menu.appendChild(closeBtn);

  btn.onclick=(e)=>{e.stopPropagation();cyclePillOpen=!cyclePillOpen;menu.classList.toggle("open",cyclePillOpen);};

  if(!window.__cyclePillOutsideBound){
    window.__cyclePillOutsideBound=true;
    document.addEventListener("click",()=>{
      if(cyclePillOpen){cyclePillOpen=false;
        const m=document.querySelector(".cycle-menu");
        if(m)m.classList.remove("open");}
    });
  }
  wrap.appendChild(btn);wrap.appendChild(menu);
  return wrap;
}

function ringSvg(p){
  const r=13,c=2*Math.PI*r;
  const off=c*(1-p);
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 34 34");
  svg.innerHTML=
    '<circle cx="17" cy="17" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="4"/>'+
    '<circle cx="17" cy="17" r="'+r+'" fill="none" stroke="var(--star)" stroke-width="4" '+
    'stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" '+
    'transform="rotate(-90 17 17)"/>';
  return svg;
}

function krCard(o,kr,readOnly){
  const card=el("div","kr-card");

  const tag=el("span","tag-kr");tag.textContent="KR · 결과";
  card.appendChild(tag);

  const top=el("div","kr-top");
  const ta=document.createElement("textarea");
  ta.className="kr-title";ta.rows=1;ta.value=kr.name;ta.placeholder="핵심 결과 이름";
  ta.disabled=!!readOnly;
  ta.oninput=()=>{kr.name=ta.value;autoGrow(ta);saveOkr();};
  top.appendChild(ta);
  if(!readOnly){
    const del=el("button","kr-del");del.textContent="삭제";
    del.onclick=()=>{o.keyResults=o.keyResults.filter(x=>x.id!==kr.id);saveOkr();renderOkrTool();};
    top.appendChild(del);
  }
  card.appendChild(top);
  requestAnimationFrame(()=>autoGrow(ta));

  // 진행 바
  const barRow=el("div","kr-bar-row");
  const bar=el("div","kr-bar");
  const fill=el("div","kr-bar-fill");
  const p=krProgress(kr);
  fill.style.width=(p*100)+"%";
  bar.appendChild(fill);
  barRow.appendChild(bar);
  const nums=el("div","kr-nums");
  const unit=kr.unit?kr.unit:"";
  nums.innerHTML='<span>'+esc(kr.start)+unit+' → '+esc(kr.target)+unit+'</span>'+
    '<span class="kr-pct">'+Math.round(p*100)+'%</span>';
  barRow.appendChild(nums);
  card.appendChild(barRow);

  // 입력값들
  const inputs=el("div","kr-inputs");
  inputs.appendChild(numField("시작",kr,"start",readOnly));
  const curField=numField("현재",kr,"current",readOnly);
  curField.classList.add("cur");
  inputs.appendChild(curField);
  inputs.appendChild(numField("목표",kr,"target",readOnly));

  const unitWrap=el("div","kr-field");
  const ulabel=document.createElement("label");ulabel.textContent="단위";
  const uinput=document.createElement("input");uinput.type="text";uinput.value=kr.unit||"";
  uinput.placeholder="명·개";uinput.style.width="52px";uinput.disabled=!!readOnly;
  uinput.oninput=()=>{kr.unit=uinput.value;saveOkr();};
  uinput.onblur=()=>renderOkrTool();
  unitWrap.appendChild(ulabel);unitWrap.appendChild(uinput);
  inputs.appendChild(unitWrap);

  // 자신감 (진척과 다른 축이라 로즈색, 단위 옆에 컴팩트하게)
  const confWrap=el("div","kr-field conf-field");
  const clabel=document.createElement("label");clabel.textContent="자신감";
  const crow=el("div","conf-input-row");
  const cinput=document.createElement("input");
  cinput.type="number";cinput.min="0";cinput.max="100";cinput.disabled=!!readOnly;
  cinput.value=Math.max(0,Math.min(100,Number(kr.confidence)));
  cinput.setAttribute("aria-label","자신감 퍼센트");
  cinput.oninput=()=>{kr.confidence=Math.max(0,Math.min(100,Number(cinput.value)||0));saveOkr();};
  cinput.onblur=()=>renderOkrTool();
  const cpct=el("span","pct-suffix");cpct.textContent="%";
  crow.appendChild(cinput);crow.appendChild(cpct);
  confWrap.appendChild(clabel);confWrap.appendChild(crow);
  inputs.appendChild(confWrap);

  card.appendChild(inputs);

  return card;
}

function numField(labelText,kr,key,readOnly){
  const wrap=el("div","kr-field");
  const label=document.createElement("label");label.textContent=labelText;
  const input=document.createElement("input");
  input.type="number";input.inputMode="decimal";input.value=kr[key];input.disabled=!!readOnly;
  input.oninput=()=>{kr[key]=input.value;saveOkr();};
  input.onblur=()=>{kr[key]=Number(input.value)||0;saveOkr();renderOkrTool();};
  wrap.appendChild(label);wrap.appendChild(input);
  return wrap;
}

// 기한 컨트롤 (참고선: 지나도 경고 없이 조용히)
function deadlineControl(obj,isGoal,onSave,onRender){
  onSave=onSave||save; onRender=onRender||renderMilestoneTool;
  const past=isPast(obj.deadline);
  const btn=el("button",isGoal?("deadline-btn"+(past?" past":"")):("mini dl"+(past?" past":"")));
  if(obj.deadline){
    const label=(isGoal?"":"")+(past?"지난 ":"")+fmt(obj.deadline);
    btn.innerHTML=(isGoal?'<span class="dot"></span>':IC.cal)+"<span>"+label+"</span>";
  }else{
    btn.innerHTML=(isGoal?'<span class="dot"></span>':IC.cal)+"<span>"+(isGoal?"기한 없음":"기한")+"</span>";
  }
  // 숨은 date input (버튼 위에 투명하게 덮여 탭하면 네이티브 달력)
  const di=document.createElement("input");
  di.type="date";if(obj.deadline)di.value=obj.deadline;
  di.setAttribute("aria-label","기한 선택");
  di.onchange=()=>{obj.deadline=di.value||null;onSave();onRender();};
  di.oncontextmenu=(e)=>{e.preventDefault();obj.deadline=null;onSave();onRender();return false;};
  btn.appendChild(di);
  return btn;
}

// --- 헬퍼 ---
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function autoGrow(t){t.style.height="auto";t.style.height=t.scrollHeight+"px";}

load();loadOkr();loadApp();renderShell();

// PWA
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw_milestone.js").then(reg=>{
      // 새 버전이 설치돼서 대기 중이면 바로 활성화하도록 신호
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing;
        if(!nw)return;
        nw.addEventListener("statechange",()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller){
            nw.postMessage({type:"SKIP_WAITING"});
          }
        });
      });
    }).catch(()=>{});
  });
  // 새 서비스워커가 주도권을 넘겨받으면 페이지를 한 번 새로고침해서 최신 반영
  let refreshed=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshed)return;
    refreshed=true;
    window.location.reload();
  });
}
</script>
